name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── 1. Test (all platforms) ────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-14, macos-13, windows-2025]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-groups --frozen
      - name: Run pytest
        run: uv run pytest

  # ── 2. Build PyInstaller binaries (all platforms) ─────────────────────────
  build-binary:
    name: Binary (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: rc0-macos-arm64
          - os: macos-13
            artifact_name: rc0-macos-x86_64
          - os: ubuntu-24.04
            artifact_name: rc0-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact_name: rc0-linux-arm64
          - os: windows-2025
            artifact_name: rc0-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dependencies (including PyInstaller)
        run: uv sync --all-groups --frozen
      - name: Build binary
        shell: bash
        run: |
          uv run pyinstaller --onefile --name rc0 --noupx src/rc0/__main__.py
      - name: Strip symbols (Linux / macOS)
        if: runner.os != 'Windows'
        run: strip dist/rc0
      - name: Rename binary with version
        id: rename
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SRC="dist/rc0${{ runner.os == 'Windows' && '.exe' || '' }}"
          DEST="dist/${{ matrix.artifact_name }}"
          # Insert version prefix: rc0-macos-arm64 → rc0-0.9.0-macos-arm64
          DEST="${DEST/rc0-/rc0-${VERSION}-}"
          mv "$SRC" "$DEST"
          echo "binary_path=$DEST" >> "$GITHUB_OUTPUT"
          echo "binary_name=$(basename $DEST)" >> "$GITHUB_OUTPUT"
      - name: Generate sha256 checksum
        shell: bash
        run: |
          cd dist
          sha256sum "${{ steps.rename.outputs.binary_name }}" > "${{ steps.rename.outputs.binary_name }}.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.binary_name }}
          path: |
            ${{ steps.rename.outputs.binary_path }}
            dist/${{ steps.rename.outputs.binary_name }}.sha256

  # ── 3. GitHub Release (binaries + SHA256SUMS) ─────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-binary]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Assemble SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          rm *.sha256
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── 4. Update Homebrew tap ─────────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew tap
    needs: [github-release]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download SHA256SUMS from release
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo zoltanf/rc0-cli \
            --pattern SHA256SUMS \
            --dir /tmp/release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fill formula template
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          SHA256_MACOS_ARM64=$(grep  "macos-arm64"   /tmp/release/SHA256SUMS | awk '{print $1}')
          SHA256_MACOS_X86_64=$(grep "macos-x86_64"  /tmp/release/SHA256SUMS | awk '{print $1}')
          SHA256_LINUX_ARM64=$(grep  "linux-arm64"   /tmp/release/SHA256SUMS | awk '{print $1}')
          SHA256_LINUX_X86_64=$(grep "linux-x86_64"  /tmp/release/SHA256SUMS | awk '{print $1}')

          sed \
            -e "s/PLACEHOLDER_VERSION/${VERSION}/g" \
            -e "s/PLACEHOLDER_SHA256_MACOS_ARM64/${SHA256_MACOS_ARM64}/g" \
            -e "s/PLACEHOLDER_SHA256_MACOS_X86_64/${SHA256_MACOS_X86_64}/g" \
            -e "s/PLACEHOLDER_SHA256_LINUX_ARM64/${SHA256_LINUX_ARM64}/g" \
            -e "s/PLACEHOLDER_SHA256_LINUX_X86_64/${SHA256_LINUX_X86_64}/g" \
            packaging/homebrew/rc0.rb > /tmp/rc0.rb

      - name: Push formula to homebrew-rc0
        run: |
          git clone \
            https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/zoltanf/homebrew-rc0.git \
            /tmp/homebrew-rc0
          mkdir -p /tmp/homebrew-rc0/Formula
          cp /tmp/rc0.rb /tmp/homebrew-rc0/Formula/rc0.rb
          cd /tmp/homebrew-rc0
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rc0.rb
          git diff --cached --quiet && echo "Formula unchanged" && exit 0
          git commit -m "rc0 ${{ github.ref_name }}"
          git push
