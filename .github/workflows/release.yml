name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── 1. Test (all platforms) ────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-14, windows-2025]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-groups --frozen
      - name: Run pytest
        run: uv run pytest

  # ── 2. Build PyInstaller binaries (all platforms) ─────────────────────────
  build-binary:
    name: Binary (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: rc0-macos-arm64
          - os: ubuntu-24.04
            artifact_name: rc0-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact_name: rc0-linux-arm64
          - os: windows-2025
            artifact_name: rc0-windows-x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dependencies (including PyInstaller)
        run: uv sync --all-groups --frozen
      - name: Build binary
        shell: bash
        run: |
          # PyInstaller's --add-data separator: ':' on Unix/macOS, ';' on Windows.
          if [ "${{ runner.os }}" = "Windows" ]; then
            uv run pyinstaller --onefile --name rc0 --noupx \
              --add-data "src/rc0/topics;rc0/topics" \
              --add-data "src/rc0/skill;rc0/skill" \
              src/rc0/__main__.py
          else
            uv run pyinstaller --onedir --name rc0 --noupx \
              --add-data "src/rc0/topics:rc0/topics" \
              --add-data "src/rc0/skill:rc0/skill" \
              src/rc0/__main__.py
          fi
      - name: Strip symbols (Linux only)
        if: runner.os == 'Linux'
        run: strip dist/rc0/rc0
      - name: Smoke-test bundled topics
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="dist/rc0.exe"
          else
            BIN="dist/rc0/rc0"
          fi
          "$BIN" --version
          "$BIN" help list | tee /tmp/rc0_topics.out
          grep -q '^authentication$' /tmp/rc0_topics.out
          grep -q '^pagination$'     /tmp/rc0_topics.out
          grep -q '^output-formats$' /tmp/rc0_topics.out
      - name: Smoke-test bundled skill
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="dist/rc0.exe"
          else
            BIN="dist/rc0/rc0"
          fi
          # --dry-run still reads the bundled resource; failure here means
          # the packaged binary can't see src/rc0/skill/SKILL.md.
          "$BIN" --dry-run skill install --project | grep -q 'would write'
      - name: Package and checksum
        id: pkg
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # artifact_name is e.g. "rc0-macos-arm64" — insert version: rc0-1.0.0-macos-arm64
          VERSIONED="${{ matrix.artifact_name }}"
          VERSIONED="${VERSIONED/rc0-/rc0-${VERSION}-}"

          if [ "${{ runner.os }}" = "Windows" ]; then
            ASSET="${VERSIONED}.exe"
            mv "dist/rc0.exe" "dist/${ASSET}"
          else
            # Bundle the rc0/ directory — avoids --onefile extraction overhead on macOS
            ASSET="${VERSIONED}.tar.gz"
            tar -czf "dist/${ASSET}" -C dist rc0
            rm -rf dist/rc0
          fi

          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ASSET}" > "${ASSET}.sha256"
          else
            shasum -a 256 "${ASSET}" > "${ASSET}.sha256"
          fi

          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.asset }}
          path: |
            dist/${{ steps.pkg.outputs.asset }}
            dist/${{ steps.pkg.outputs.asset }}.sha256

  # ── 3. GitHub Release (binaries + SHA256SUMS) ─────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-binary]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true
      - name: Assemble SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          rm *.sha256
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── 4. Update Homebrew tap ─────────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew tap
    needs: [github-release]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download SHA256SUMS from release
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo zoltanf/rc0-cli \
            --pattern SHA256SUMS \
            --dir /tmp/release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fill formula template
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          SHA256_MACOS_ARM64=$(grep "macos-arm64.tar.gz"  /tmp/release/SHA256SUMS | awk '{print $1}')
          SHA256_LINUX_ARM64=$(grep "linux-arm64.tar.gz"  /tmp/release/SHA256SUMS | awk '{print $1}')
          SHA256_LINUX_X86_64=$(grep "linux-x86_64.tar.gz" /tmp/release/SHA256SUMS | awk '{print $1}')

          sed \
            -e "s/PLACEHOLDER_VERSION/${VERSION}/g" \
            -e "s/PLACEHOLDER_SHA256_MACOS_ARM64/${SHA256_MACOS_ARM64}/g" \
            -e "s/PLACEHOLDER_SHA256_LINUX_ARM64/${SHA256_LINUX_ARM64}/g" \
            -e "s/PLACEHOLDER_SHA256_LINUX_X86_64/${SHA256_LINUX_X86_64}/g" \
            packaging/homebrew/rc0.rb > /tmp/rc0.rb

      - name: Push formula to homebrew-rc0
        run: |
          git clone \
            https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/zoltanf/homebrew-rc0.git \
            /tmp/homebrew-rc0
          mkdir -p /tmp/homebrew-rc0/Formula
          cp /tmp/rc0.rb /tmp/homebrew-rc0/Formula/rc0.rb
          cd /tmp/homebrew-rc0
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rc0.rb
          git diff --cached --quiet && echo "Formula unchanged" && exit 0
          git commit -m "rc0 ${{ github.ref_name }}"
          git push
