name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── 1. Test (all platforms) ────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-14, macos-13, windows-2025]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-groups --frozen
      - name: Run pytest
        run: uv run pytest

  # ── 2. Build PyInstaller binaries (all platforms) ─────────────────────────
  build-binary:
    name: Binary (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: rc0-macos-arm64
          - os: macos-13
            artifact_name: rc0-macos-x86_64
          - os: ubuntu-24.04
            artifact_name: rc0-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact_name: rc0-linux-arm64
          - os: windows-2025
            artifact_name: rc0-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dependencies (including PyInstaller)
        run: uv sync --all-groups --frozen
      - name: Build binary
        shell: bash
        run: |
          uv run pyinstaller --onefile --name rc0 --noupx src/rc0/__main__.py
      - name: Strip symbols (Linux / macOS)
        if: runner.os != 'Windows'
        run: strip dist/rc0
      - name: Rename binary with version
        id: rename
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SRC="dist/rc0${{ runner.os == 'Windows' && '.exe' || '' }}"
          DEST="dist/${{ matrix.artifact_name }}"
          # Insert version prefix: rc0-macos-arm64 → rc0-0.9.0-macos-arm64
          DEST="${DEST/rc0-/rc0-${VERSION}-}"
          mv "$SRC" "$DEST"
          echo "binary_path=$DEST" >> "$GITHUB_OUTPUT"
          echo "binary_name=$(basename $DEST)" >> "$GITHUB_OUTPUT"
      - name: Generate sha256 checksum
        shell: bash
        run: |
          cd dist
          sha256sum "${{ steps.rename.outputs.binary_name }}" > "${{ steps.rename.outputs.binary_name }}.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.binary_name }}
          path: |
            ${{ steps.rename.outputs.binary_path }}
            dist/${{ steps.rename.outputs.binary_name }}.sha256

  # ── 3. GitHub Release (binaries + SHA256SUMS) ─────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-binary]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Assemble SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          rm *.sha256
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
